services:
  api:
    build: .
    ports: 
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./vectorstore:/app/vectorstore
    env_file: 
      - .env
    environment:
      - MLFLOW_TRACKING_URI = http://localhost:5000

  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.11.1 
    ports:
      - "5000:5000"
    volumes:
      - ./mlruns:/mlruns
    command: >
      mlflow server
      --host 0.0.0.0
      --port 5000
      --backend-store-uri sqlite:////mlruns/mlflow.db
      --default-artifact-root /mlruns/artifacts